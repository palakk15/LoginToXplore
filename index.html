<!DOCTYPE html>
<html>
<head>
    <title>Student Enrollment Form</title>

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

    <!-- ✅ FINAL FIX -->
    <script src="https://login2explore.com/jpdb/resources/js/0.0.3/jpdb-commons.js"></script>
</head>

<body>
<div class="container">
    <h2>Student Enrollment Form</h2>

    <form id="studentForm">

        <label>Roll No</label>
        <input type="text" id="rollNo" class="form-control" onblur="getStudent()"><br>

        <label>Full Name</label>
        <input type="text" id="fullName" class="form-control" disabled><br>

        <label>Class</label>
        <input type="text" id="studentClass" class="form-control" disabled><br>

        <label>Birth Date</label>
        <input type="date" id="birthDate" class="form-control" disabled><br>

        <label>Address</label>
        <input type="text" id="address" class="form-control" disabled><br>

        <label>Enrollment Date</label>
        <input type="date" id="enrollDate" class="form-control" disabled><br>

        <button type="button" id="saveBtn" onclick="saveData()" disabled>Save</button>
        <button type="button" id="updateBtn" onclick="updateData()" disabled>Update</button>
        <button type="button" id="resetBtn" onclick="resetForm()" disabled>Reset</button>

    </form>
</div>

<script src="student.js"></script>
</body>
</html>
